---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "yourls_environment_variable_db_hostname", "new": "yourls_database_hostname" }
    - { "old": "yourls_environment_variable_db_port", "new": "yourls_database_port" }
    - { "old": "yourls_environment_variable_db_user", "new": "yourls_database_username" }
    - { "old": "yourls_environment_variable_db_pass", "new": "yourls_database_password" }
    - { "old": "yourls_http_header_content_permission_policy", "new": "yourls_http_header_permissions_policy" }
    - { "old": "yourls_container_image_force_pull", "new": "<removed> (the new community.docker.docker_image_pull module handles this natively)" }

- name: Fail if required YOURLS settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item.name }}`).
  when: "item.when | bool and lookup('vars', item.name, default='') | string | length == 0"
  with_items:
    - { "name": "yourls_uid", when: true }
    - { "name": "yourls_gid", when: true }
    - { "name": "yourls_hostname", when: true }
    - { "name": "yourls_path_prefix", when: true }
    - { "name": "yourls_container_network", when: true }
    - { "name": "yourls_container_labels_traefik_middleware_basic_auth_users", when: "{{ yourls_container_labels_traefik_middleware_basic_auth_enabled }}" }
    - { "name": "yourls_database_hostname", when: "{{ not yourls_database_socket_enabled }}" }
    - { "name": "yourls_database_password", when: true }
    - { "name": "yourls_database_socket_path_host", when: "{{ yourls_database_socket_enabled }}" }
    - { "name": "yourls_environment_variable_user", when: true }
    - { "name": "yourls_environment_variable_pass", when: true }
    - { "name": "yourls_environment_variable_cookiekey", when: true }

- name: Run if Traefik is enabled
  when: yourls_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for YOURLS are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - yourls_container_labels_traefik_hostname
        - yourls_container_labels_traefik_path_prefix

    - name: Fail if yourls_container_labels_traefik_path_prefix is different than /
      ansible.builtin.fail:
        msg: >-
          yourls_container_labels_traefik_path_prefix (`{{ yourls_container_labels_traefik_path_prefix }}`) must be `/`.
          YOURLS does not support hosting under a subpath yet.
      when: "yourls_container_labels_traefik_path_prefix != '/'"

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `yourls_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if yourls_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          yourls_container_labels_traefik_path_prefix (`{{ yourls_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/yourls`).
      when: "yourls_container_labels_traefik_path_prefix != '/' and yourls_container_labels_traefik_path_prefix[-1] == '/'"
